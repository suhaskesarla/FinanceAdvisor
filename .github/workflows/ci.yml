name: CI

on:
  pull_request:
    branches: [main]

jobs:

  validate-commits:
    name: Validate commit messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Commitlint
        uses: wagoid/commitlint-github-action@v6
        with:
          configFile: commitlint.config.js

  build-and-test:
    name: Build, format check and test
    runs-on: ubuntu-latest
    needs: validate-commits

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          cache: true
          cache-dependency-path: '**/packages.lock.json'

      - name: Restore packages (with lock file)
        run: dotnet restore --use-lock-file

      - name: Check formatting
        run: dotnet format --verify-no-changes --severity error

      - name: Build (Release)
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        run: |
          dotnet test --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=cobertura

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-results
          path: ./coverage

      - name: Post coverage summary to PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const findFiles = (dir, ext) => {
              let results = [];
              fs.readdirSync(dir).forEach(file => {
                const full = path.join(dir, file);
                if (fs.statSync(full).isDirectory()) results = results.concat(findFiles(full, ext));
                else if (full.endsWith(ext)) results.push(full);
              });
              return results;
            };
            const files = findFiles('./coverage', 'coverage.cobertura.xml');
            if (files.length === 0) return;
            await core.summary
              .addHeading('Test Coverage Report')
              .addRaw(`Coverage files found: ${files.length}`)
              .write();

  sonar-scan:
    name: SonarCloud quality gate
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-results
          path: ./coverage

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=your-org
            -Dsonar.projectKey=FinanceAdvisor
            -Dsonar.sources=src
            -Dsonar.tests=tests
            -Dsonar.cs.cobertura.reportsPaths=coverage/**/coverage.cobertura.xml
            -Dsonar.coverage.exclusions=**/Program.cs,**/Migrations/**
